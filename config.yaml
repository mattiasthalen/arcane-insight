gateways:
  local:
    connection:
      type: spark
      config:
        spark.executorEnv.HADOOP_USER_NAME: mattiasthalen
        spark.driver.extraJavaOptions: -Djava.security.manager=allow
        spark.executor.extraJavaOptions: -Djava.security.manager=allow
        spark.sql.extensions: org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
        spark.sql.catalog.local: org.apache.iceberg.spark.SparkCatalog
        spark.sql.catalog.local.type: hadoop
        spark.sql.catalog.local.warehouse: ./warehouse
        spark.log.level: ERROR
    
    state_connection:
      type: duckdb
      database: ./spark-warehouse/state.duckdb

default_gateway: local
default_target_environment: dev

model_defaults:
  dialect: spark
  start: 2024-11-07
